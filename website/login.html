<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Quản Lý Nhà Nghỉ</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 800: '#1e40af', 900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased h-screen flex items-center justify-center p-4">

    <!-- Auth Guard: Nếu đã đăng nhập hợp lệ thì đá về trang chủ, nếu lỗi thì dọn rác -->
    <script>
        const isLogged = localStorage.getItem('isLoggedIn');
        const user = localStorage.getItem('currentUser');
        
        if (isLogged === 'true' && user) {
            window.location.href = 'index.html';
        } else {
            // Xóa rác phòng trường hợp isLoggedIn = true nhưng mất currentUser (Nguyên nhân gây loop)
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
        }
    </script>

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        <!-- Logo Header -->
        <div class="bg-brand-900 p-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/10 mb-4 backdrop-blur-sm">
                <i data-lucide="building" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Motel<span class="text-brand-100">Pro</span></h1>
            <p class="text-brand-100/80 text-sm mt-1">Hệ thống quản lý lưu trú</p>
        </div>

        <!-- Form -->
        <div class="p-8">
            <form id="login-form" class="space-y-6">
                <!-- Tên đăng nhập -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Tên đăng nhập</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="text" id="username" class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all" placeholder="Nhập tài khoản (admin)">
                    </div>
                </div>

                <!-- Mật khẩu -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Mật khẩu</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="password" id="password" class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all" placeholder="Nhập mật khẩu (123456)">
                    </div>
                </div>

                <!-- Báo lỗi -->
                <p id="error-message" class="text-red-500 text-sm font-medium text-center hidden"></p>

                <button type="submit" class="w-full py-2.5 px-4 bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold rounded-lg shadow-sm shadow-brand-500/30 transition-colors flex items-center justify-center gap-2">
                    Đăng nhập <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-slate-600 mb-3">
                    Chưa có tài khoản? 
                    <a href="register.html" class="font-semibold text-brand-600 hover:text-brand-800 transition-colors">Đăng ký ngay</a>
                </p>
                <p class="text-xs text-slate-400">Đồ án môn học &copy; 2024</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
