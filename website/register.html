<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Quản Lý Nhà Nghỉ</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 800: '#1e40af', 900: '#1e3a8a' } }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        <!-- Logo Header -->
        <div class="bg-brand-900 p-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/10 mb-4 backdrop-blur-sm">
                <i data-lucide="user-plus" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Đăng Ký Tài Khoản</h1>
            <p class="text-brand-100/80 text-sm mt-1">Trở thành thành viên của MotelPro</p>
        </div>

        <!-- Form -->
        <div class="p-8">
            <form id="register-form" class="space-y-4">
                <!-- Tên hiển thị -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Họ và tên</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="badge-check" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="text" id="fullname" class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all" placeholder="Nguyễn Văn A">
                    </div>
                    <p id="error-fullname" class="text-rose-500 text-xs mt-1 hidden"></p>
                </div>

                <!-- Tên đăng nhập -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Tên đăng nhập</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="text" id="username" class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all" placeholder="Viết liền không dấu">
                    </div>
                    <p id="error-username" class="text-rose-500 text-xs mt-1 hidden"></p>
                </div>

                <!-- Mật khẩu -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Mật khẩu</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="password" id="password" class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all" placeholder="Nhập mật khẩu">
                    </div>
                    <p id="error-password" class="text-rose-500 text-xs mt-1 hidden"></p>
                </div>

                <!-- Nhập lại Mật khẩu -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Nhập lại mật khẩu</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock-keyhole" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="password" id="re-password" class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all" placeholder="Nhập lại mật khẩu">
                    </div>
                    <p id="error-repassword" class="text-rose-500 text-xs mt-1 hidden"></p>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full py-2.5 px-4 bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold rounded-lg shadow-sm shadow-brand-500/30 transition-colors">
                        Tạo tài khoản
                    </button>
                </div>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-slate-600">
                    Đã có tài khoản? 
                    <a href="login.html" class="font-semibold text-brand-600 hover:text-brand-800 transition-colors">Đăng nhập ngay</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
